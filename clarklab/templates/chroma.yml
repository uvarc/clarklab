# One chroma instance holds both environments' collections (fairscape_test,
# fairscape_prod). Persist its data dir so the index survives pod restarts —
# without a volume chroma starts empty every restart until the nightly repopulate.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{.Values.chromadb.volume.pvcName}}
  namespace: {{.Values.namespace}}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{.Values.chromadb.volume.storageClassName}}
  resources:
    requests:
      storage: {{.Values.chromadb.volume.storage}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{.Values.chromadb.appName}}-deployment"
  namespace: {{.Values.namespace}}
  labels:
    app: {{.Values.chromadb.appName}}
spec:
  replicas: 1
  # ReadWriteOnce volume: a rolling update's new pod cannot mount while the old
  # one still holds it, so replace rather than surge.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{.Values.chromadb.appName}}
  template:
    metadata:
      labels:
        app: {{.Values.chromadb.appName}}
    spec:
      containers:
      - name: chromadb
        image: {{.Values.chromadb.image}}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: {{.Values.chromadb.containerPort}}
          name: http
        volumeMounts:
          - name: chroma-data
            mountPath: /data
        resources:
          requests:
            memory: {{.Values.chromadb.requests.memory | quote}}
            cpu: {{.Values.chromadb.requests.cpu | quote}}
          limits:
            memory: {{.Values.chromadb.limits.memory | quote}}
            cpu: {{.Values.chromadb.limits.cpu | quote}}
      volumes:
        - name: chroma-data
          persistentVolumeClaim:
            claimName: {{.Values.chromadb.volume.pvcName}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{.Values.chromadb.serviceName}}
  namespace: {{.Values.namespace}}
  labels:
    app: {{.Values.chromadb.appName}}
spec:
  type: ClusterIP
  selector:
    app: {{.Values.chromadb.appName}}
  ports:
  - port: {{.Values.chromadb.servicePort}}
    targetPort: http
    protocol: TCP
    name: http
